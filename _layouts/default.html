<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    /* Pervasive Fixed Background Protocol */
    body { 
      display: flex; margin: 0; font-family: Arial, sans-serif; overflow-x: hidden; 
      background-image: url("{{ '/assets/images/CNU-view.png' | relative_url }}");
      background-attachment:fixed;
      background-position:center;
      background-repeat:no-repeat;
      background-size:cover;
    }
    
    /* Translucent Sidebar */
    .sidebar { 
      width: 250px; 
      height: 100vh; 
      background: rgba(163, 0, 0, 0.736); 
      color: white; 
      padding: 20px; 
      position: fixed; 
      top: 0;
      left: 0;
      transition: transform 0.3s ease; 
      z-index: 1000;
      overflow-y: auto;
      box-sizing: border-box;
      border-right-width:2px;
      border-right-color:#FFD700;
    }
    
    .sidebar.collapsed { 
      transform: translateX(-100%); 
    }
    
    .sidebar h3 {
      margin-top: 60px; 
      margin-bottom: 20px;
      padding: 0 10px;
    }
    
    .sidebar a, .sidebar summary { 
      color: white; 
      text-decoration: none; 
      margin-bottom: 5px; 
      padding: 10px;
      transition: background-color 0.2s, color 0.2s;
      border-left: 4px solid transparent; 
      box-sizing: border-box;
      cursor: pointer;
      outline: none;
    }

    .sidebar a {
      display: block;
    }

    .sidebar summary {
      display: list-item;
      list-style-position: inside;
    }

    .sidebar a:hover, .sidebar summary:hover {
      background-color: rgba(94, 0, 0, 0.623);
      border-top-right-radius: 5px;
      border-bottom-right-radius: 5px;
    }
    
    .sidebar a.active {
      color: #FFD700;
      border-left: 4px solid #FFD700;
      background-color: rgba(221, 14, 14, 0.911);
      border-top-right-radius: 5px;
      border-bottom-right-radius: 5px;
    }
    
    .sidebar details {
      margin-bottom: 5px;
    }

    .sidebar details div {
      padding-left: 15px;
    }

    /* Translucent Content Area for Legibility */
    .content { 
      margin-left: 250px; 
      padding: 40px; 
      padding-top: 60px; 
      flex-grow: 1; 
      transition: margin-left 0.3s ease; 
      box-sizing: border-box;
      background-color: rgba(255, 255, 255, 0.9); 
      min-height: 100vh; 
      /* New: Translucent White foreground overlay */
      background-color: rgba(255, 255, 255, 0.9); 
    }
    
    .content.expanded { 
      margin-left: 0; 
    }
    
    .toggle-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 1001;
      background: #cfaa06;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
    }
    .toggle-btn:hover { background: #d1890b; }

    /* Primary Carousel Container (Home Page) */
    .carousel-primary {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      border: 4px solid #FFD700;
      background-color: #800000;
      overflow: hidden;
      box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    }
    
    .carousel-primary .carousel-slide { width: 100%; display: none; }
    
    .carousel-primary .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.4);
      color: white;
      border: none;
      font-size: 30px;
      padding: 15px 10px;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }
    
    .carousel-primary .nav-btn:hover { background: rgba(0, 0, 0, 0.9); color: #FFD700; }
    .carousel-primary .prev { left: 0; }
    .carousel-primary .next { right: 0; }

    /* Secondary Carousel Container (Subpages) */
    .carousel-secondary {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: 20px auto;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      border: 1px solid #ccc;
    }
    
    .carousel-secondary .carousel-slide { width: 100%; display: none; }
    
    .carousel-secondary .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.7);
      color: #333;
      border: none;
      font-size: 20px;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 50%;
      margin: 0 10px;
    }
    
    .carousel-secondary .nav-btn:hover { background: rgba(255, 255, 255, 1); }
    .carousel-secondary .prev { left: 0; }
    .carousel-secondary .next { right: 0; }

/* CSS Keyframe Animation for Carousel Fading */
    @keyframes fadeTransition {
      from { opacity: 0.1; }
      to { opacity: 1; }
    }

    .carousel-primary .carousel-slide, 
    .carousel-secondary .carousel-slide {
      animation: fadeTransition 0.6s ease-in-out;
    }

    @media screen and (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        box-shadow: 2px 0 10px rgba(0,0,0,0.5);
      }
      .sidebar.mobile-open {
        transform: translateX(0);
      }
      .content {
        margin-left: 0;
        padding: 20px;
        padding-top: 70px;
        width: 100%;
      }
      .content.expanded {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>

  <button class="toggle-btn" onclick="toggleSidebar()">☰ Menu</button>

  <div class="sidebar" id="dossierSidebar">
    <h3>Internship Journey</h3>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/introduction.html' | relative_url }}">Introduction</a>
    <a href="{{ '/vmgo.html' | relative_url }}">CNU</a>
    <a href="{{ '/co-interns.html' | relative_url }}">Co-Interns</a>
    <a href="{{ '/participating.html' | relative_url }}">Participating Schools</a>

    <details {% if page.url contains '/pre-deployment' %}open{% endif %}>
      <summary>Pre-deployment</summary>
      <div>
        <a href="{{ '/pre-deployment-expectations.html' | relative_url }}">Expectations & Thoughts</a>
        <a href="{{ '/pre-deployment-experience.html' | relative_url }}">Experience</a>
        <a href="{{ '/pre-deployment-insights.html' | relative_url }}">Insights</a>
      </div>
    </details>

    <details {% if page.url contains '/off-campus' %}open{% endif %}>
      <summary>Off-campus</summary>
      <div>
        <a href="{{ '/off-campus-expectations.html' | relative_url }}">Expectations & Goals</a>
        <a href="{{ '/off-campus-first-day.html' | relative_url }}">First Day</a>
        <a href="{{ '/off-campus-first-class.html' | relative_url }}">First Class</a>
        <a href="{{ '/off-campus-journey.html' | relative_url }}">Experiences</a>
        <a href="{{ '/off-campus-insights.html' | relative_url }}">Insights</a>
        <a href="{{ '/off-campus-appendix.html' | relative_url }}">Appendix</a>
      </div>
    </details>

    <details {% if page.url contains '/on-campus' %}open{% endif %}>
      <summary>On-campus</summary>
      <div>
        <a href="{{ '/on-campus-expectations.html' | relative_url }}">Expectations & Goals</a>
        <a href="{{ '/on-campus-journey.html' | relative_url }}">Experiences</a>
        <a href="{{ '/on-campus-insights.html' | relative_url }}">Insights</a>
        <a href="{{ '/on-campus-appendix.html' | relative_url }}">Appendix</a>
      </div>
    </details>
  </div>
  
  <div class="content" id="mainContent">
    <div style="max-width: 800px; margin: 0 auto;">
      {{ content }}
    </div>
  </div>

  <script>

    let slideIndex = 1;
    function shiftSlide(n) {
      const slides = document.querySelectorAll('.carousel-primary .carousel-slide, .carousel-secondary .carousel-slide, .carousel-profile .carousel-slide');
      if (slides.length === 0) return; 
      
      slideIndex += n;
      if (slideIndex > slides.length) { slideIndex = 1 }
      if (slideIndex < 1) { slideIndex = slides.length }
      
      for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }
      slides[slideIndex - 1].style.display = "block";
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('dossierSidebar');
      const content = document.getElementById('mainContent');
      
      if (window.innerWidth <= 768) {
        sidebar.classList.toggle('mobile-open');
      } else {
        sidebar.classList.toggle('collapsed');
        content.classList.toggle('expanded');
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      const currentPath = window.location.pathname;
      const links = document.querySelectorAll('.sidebar a');
      
      links.forEach(link => {
        const linkPath = new URL(link.href).pathname;
        if (linkPath === currentPath) {
          link.classList.add('active');
        }
      });
    });
  </script>
</body>
</html>
