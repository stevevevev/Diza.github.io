<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <style>
    body { display: flex; margin: 0; font-family: Arial, sans-serif; overflow-x: hidden; }
    
    .sidebar { 
      width: 250px; 
      height: 100vh; 
      background: #333; 
      color: white; 
      padding: 20px; 
      position: fixed; 
      top: 0;
      left: 0;
      transition: transform 0.3s ease; 
      z-index: 1000;
      overflow-y: auto;
    }
    
    .sidebar.collapsed { 
      transform: translateX(-100%); 
    }
    
    .sidebar a { 
      color: white; 
      text-decoration: none; 
      display: block; 
      margin-bottom: 10px; 
      padding: 5px 0;
      transition: color 0.2s;
    }

    .sidebar a:hover {
      color: #ccc;
    }
    
    /* Active Page Highlight Protocol */
    .sidebar a.active {
      color: #FFD700;
      font-weight: bold;
      padding-left: 10px;
      border-left: 3px solid #FFD700;
      background-color: rgba(255, 255, 255, 0.1);
    }
    
    .content { 
      margin-left: 290px; 
      padding: 40px; 
      padding-top: 60px; 
      flex-grow: 1; 
      max-width: 800px; 
      transition: margin-left 0.3s ease; 
    }
    
    .content.expanded { 
      margin-left: 40px; 
    }
    
    .toggle-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 1001;
      background: #555;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
    }
    .toggle-btn:hover { background: #777; }
  </style>
</head>
<body>

  <button class="toggle-btn" onclick="toggleSidebar()">☰ Menu</button>
  

  <div class="sidebar" id="dossierSidebar">
    <h3 style="margin-top: 40px;">Internship Journey</h3>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/introduction.html' | relative_url }}">Introduction</a>
    <a href="{{ '/vmgo.html' | relative_url }}">CNU</a>
    <a href="{{ '/co-interns.html' | relative_url }}">Co-Interns</a>
    <a href="{{ '/participating.html' | relative_url }}"> Participating Schools </a>

    <details {% if page.url contains '/pre-deployment' %}open{% endif %}>
      <summary style="cursor: pointer; margin-bottom: 10px; color: white; outline: none;">Pre-deployment</summary>
      <div style="padding-left: 15px;">
        <a href="{{ '/pre-deployment-expectations.html' | relative_url }}">Expectations & Thoughts</a>
        <a href="{{ '/pre-deployment-experience.html' | relative_url }}">Experience</a>
        <a href="{{ '/pre-deployment-insights.html' | relative_url }}">Insights</a>
      </div>
    </details>

    <details {% if page.url contains '/off-campus' %}open{% endif %}>
      <summary style="cursor: pointer; margin-bottom: 10px; color: white; outline: none;">Off-campus</summary>
      <div style="padding-left: 15px;">
        <a href="{{ '/off-campus-expectations.html' | relative_url }}">Expectations & Goals</a>
        <a href="{{ '/off-campus-first-day.html' | relative_url }}">First Day</a>
        <a href="{{ '/off-campus-first-class.html' | relative_url }}">First Class</a>
        <a href="{{ '/off-campus-journey.html' | relative_url }}">Experiences</a>
        <a href="{{ '/off-campus-insights.html' | relative_url }}">Insights</a>
        <a href="{{ '/off-campus-appendix.html' | relative_url }}">Appendix</a>
      </div>
    </details>

    <details {% if page.url contains '/on-campus' %}open{% endif %}>
      <summary style="cursor: pointer; margin-bottom: 10px; color: white; outline: none;">On-campus</summary>
      <div style="padding-left: 15px;">
        <a href="{{ '/on-campus-expectations.html' | relative_url }}">Expectations & Goals</a>
        <a href="{{ '/on-campus-journey.html' | relative_url }}">Experiences</a>
        <a href="{{ '/on-campus-insights.html' | relative_url }}">Insights</a>
        <a href="{{ '/on-campus-appendix.html' | relative_url }}">Appendix</a>
      </div>
    </details>
  </div>
  
  <div class="content" id="mainContent">
    {{ content }}
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('dossierSidebar').classList.toggle('collapsed');
      document.getElementById('mainContent').classList.toggle('expanded');
    }

    /* Active Page Evaluation Script */
    document.addEventListener("DOMContentLoaded", function() {
      const currentPath = window.location.pathname;
      const links = document.querySelectorAll('.sidebar a');
      
      links.forEach(link => {
        const linkPath = new URL(link.href).pathname;
        if (linkPath === currentPath) {
          link.classList.add('active');
        }
      });
    });
  </script>
</body>
</html>
